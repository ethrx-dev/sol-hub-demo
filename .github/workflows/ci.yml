name: CI
on: [push, pull_request]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm lint

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solhub_test
          POSTGRES_USER: solhub
          POSTGRES_PASSWORD: solhub_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r apps/api/requirements.txt
      - run: pip install pytest httpx
      - run: cd apps/api && alembic upgrade head
      - run: cd apps/api && pytest
        env:
          DATABASE_URL: postgresql+asyncpg://solhub:solhub_test@localhost:5432/solhub_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret
